# https://docs.netlify.com/build/configure-builds/file-based-build-configuration/

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  # Match Netlify LTS; override in the UI if needed
  NODE_VERSION = "20"
  # No trailing slash — feeds canonical, Open Graph, sitemap, JSON-LD at build time
  VITE_PUBLIC_SITE_URL = "https://tryjsc.netlify.app"

# Single-page app: client-side routes fall back to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
